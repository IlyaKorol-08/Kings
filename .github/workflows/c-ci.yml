# Файл: .github/workflows/c-ci.yml (находится в ветке main)
name: Общий CI для C-программ

on:
  # Триггер workflow_call позволяет вызывать этот файл из других веток или репозиториев
  workflow_call:
    inputs:
      # Ожидаем, что вызывающая ветка передаст, какую цель Makefile запускать
      make-target:
        required: false
        type: string
        default: 'all' # По умолчанию собираем всё

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 1. Скачать код из той ветки, которая вызвала CI
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Установить компилятор и утилиты (gcc, make)
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      # 3. Запустить Makefile с нужной целью
      - name: Run Make
        run: make ${{ inputs.make-target }}
